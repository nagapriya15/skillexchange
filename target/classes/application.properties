# ===================================================================
# Student Skill Exchange Platform - Application Properties
# ===================================================================

# Server Configuration
server.port=8081

# ===================================================================
# H2 Database Configuration (for development/testing)
# ===================================================================
spring.datasource.url=jdbc:h2:mem:skillexchange_db
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ===================================================================
# JPA / Hibernate Configuration
# ===================================================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Disable schema.sql (Hibernate will auto-create tables from JPA entities)
spring.sql.init.mode=never

# ===================================================================
# H2 Console (for debugging)
# ===================================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Application Name
spring.application.name=Student Skill Exchange Platform
