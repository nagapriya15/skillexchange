<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chat - Student Skill Exchange Platform">
    <title>SkillExchange — Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<div class="container">
    <div class="page-header">
        <h1>Chat 💬</h1>
        <p>Message other students about skill exchanges</p>
    </div>

    <div class="card" style="max-width: 720px; margin: 0 auto 1.5rem;">
        <div style="display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: end;">
            <div class="form-group" style="flex: 1; min-width: 130px; margin-bottom: 0;">
                <label for="myId">Your User ID</label>
                <input type="number" id="myId" class="form-control" placeholder="Your ID">
            </div>
            <div class="form-group" style="flex: 1; min-width: 130px; margin-bottom: 0;">
                <label for="otherId">Other User ID</label>
                <input type="number" id="otherId" class="form-control" placeholder="Their ID">
            </div>
            <button class="btn btn-primary" onclick="loadChat()" style="height: 46px;">Open Chat</button>
        </div>
    </div>

    <div style="max-width: 720px; margin: 0 auto;">
        <div class="chat-container" id="chatBox" style="display: none;">
            <div class="chat-header">
                <div class="avatar" id="chatAvatar">U</div>
                <div class="info">
                    <h3 id="chatPartnerName">User</h3>
                    <span>● Online</span>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="empty-state">
                    <div class="empty-icon">💬</div>
                    <h3 class="empty-title">No messages yet</h3>
                    <p class="empty-subtitle">Say hello and start the conversation!</p>
                </div>
            </div>

            <div class="chat-input-area">
                <input type="text" id="messageInput" class="form-control" placeholder="Type a message..."
                       onkeypress="if(event.key === 'Enter') sendMessage()">
                <button class="btn btn-primary" onclick="sendMessage()">
                    Send ↗
                </button>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script>
    requireAuth();
    buildNavbar('chat');

    let currentMyId = null;
    let currentOtherId = null;

    async function loadChat() {
        currentMyId = document.getElementById('myId').value;
        currentOtherId = document.getElementById('otherId').value;

        if (!currentMyId || !currentOtherId) {
            showToast('Please enter both User IDs', 'error');
            return;
        }

        document.getElementById('chatAvatar').textContent = 'U' + currentOtherId;
        document.getElementById('chatPartnerName').textContent = 'User ' + currentOtherId;

        document.getElementById('chatBox').style.display = 'flex';
        showSkeleton('chatMessages', 5, 'chat');

        await fetchMessages();
        document.getElementById('messageInput').focus();
    }

    async function fetchMessages() {
        try {
            const messages = await apiCall(
                `/api/messages/chat?senderId=${currentMyId}&receiverId=${currentOtherId}`
            );

            const container = document.getElementById('chatMessages');

            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">💬</div>
                        <h3 class="empty-title">No messages yet</h3>
                        <p class="empty-subtitle">Say hello and start the conversation!</p>
                    </div>`;
                return;
            }

            let html = '';
            let lastDate = '';

            messages.forEach(m => {
                const isSent = m.sender && m.sender.id == currentMyId;
                const msgDate = m.timestamp ? new Date(m.timestamp) : new Date();
                const dateStr = msgDate.toLocaleDateString([], { month: 'short', day: 'numeric' });
                const timeStr = msgDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                if (dateStr !== lastDate) {
                    html += `<div class="chat-date-divider"><span>${dateStr}</span></div>`;
                    lastDate = dateStr;
                }

                html += `
                    <div class="chat-bubble ${isSent ? 'sent' : 'received'}">
                        ${escapeHtml(m.message)}
                        <span class="time">${timeStr}</span>
                    </div>
                `;
            });

            container.innerHTML = html;

            requestAnimationFrame(() => {
                container.scrollTop = container.scrollHeight;
            });
        } catch (err) {
            showToast(err.message, 'error');
        }
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();

        if (!text || !currentMyId || !currentOtherId) {
            if (!text) showToast('Please enter a message', 'error');
            return;
        }

        const container = document.getElementById('chatMessages');
        const emptyState = container.querySelector('.empty-state');
        if (emptyState) emptyState.remove();

        const now = new Date();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        const bubble = document.createElement('div');
        bubble.className = 'chat-bubble sent';
        bubble.innerHTML = `${escapeHtml(text)}<span class="time">${timeStr}</span>`;
        container.appendChild(bubble);

        requestAnimationFrame(() => {
            container.scrollTop = container.scrollHeight;
        });

        input.value = '';
        input.focus();

        try {
            await apiCall('/api/messages/send', 'POST', {
                senderId: parseInt(currentMyId),
                receiverId: parseInt(currentOtherId),
                message: text
            });
        } catch (err) {
            showToast(err.message, 'error');
            bubble.remove();
        }
    }
</script>
</body>
</html>
