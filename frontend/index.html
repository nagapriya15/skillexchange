<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Student Skill Exchange Platform - Login and Register">
    <title>SkillExchange — Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <h1>⚡ SkillExchange</h1>
        <p class="subtitle">Exchange skills, grow together</p>

        <!-- Session Expired Message (hidden by default) -->
        <div id="sessionMsg" style="display:none; text-align:center; padding:0.75rem; margin-bottom:1.25rem; background:rgba(255,165,2,0.1); border:1px solid rgba(255,165,2,0.2); border-radius:var(--radius-xs); color:var(--warning); font-size:0.85rem;">
            ⏰ Session expired. Please login again.
        </div>

        <!-- Tabs: Login / Register -->
        <div class="auth-tabs">
            <button class="auth-tab active" id="loginTab" onclick="showLogin()">Login</button>
            <button class="auth-tab" id="registerTab" onclick="showRegister()">Register</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Login →</button>
        </form>

        <!-- Register Form (hidden by default) -->
        <form id="registerForm" style="display: none;" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="regUsername">Username</label>
                <input type="text" id="regUsername" class="form-control" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="regEmail">Email</label>
                <input type="email" id="regEmail" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" class="form-control" placeholder="Create password (min 6 chars)" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="regBtn">Create Account →</button>
        </form>
    </div>
</div>

<script src="app.js"></script>
<script>
    // If already logged in and token is valid, go to dashboard
    if (getToken() && !isTokenExpired()) {
        window.location.href = 'dashboard.html';
    }

    // Show session expired message if redirected due to expiry
    if (sessionStorage.getItem('session_expired') === 'true') {
        document.getElementById('sessionMsg').style.display = 'block';
        sessionStorage.removeItem('session_expired');
    }

    function showLogin() {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('loginTab').classList.add('active');
        document.getElementById('registerTab').classList.remove('active');
    }

    function showRegister() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('registerTab').classList.add('active');
        document.getElementById('loginTab').classList.remove('active');
    }

    async function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        btn.innerHTML = '<span class="spinner"></span> Logging in...';
        btn.disabled = true;

        try {
            const data = await apiCall('/auth/login', 'POST', {
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            });
            setToken(data.token);
            document.getElementById('sessionMsg').style.display = 'none';
            showToast('Login successful! Redirecting...');
            setTimeout(() => window.location.href = 'dashboard.html', 800);
        } catch (err) {
            showToast(err.message, 'error');
            btn.innerHTML = 'Login →';
            btn.disabled = false;
        }
    }

    async function handleRegister(e) {
        e.preventDefault();
        const btn = document.getElementById('regBtn');
        btn.innerHTML = '<span class="spinner"></span> Creating...';
        btn.disabled = true;

        try {
            await apiCall('/auth/register', 'POST', {
                username: document.getElementById('regUsername').value,
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value
            });
            showToast('Account created! Please login.');
            showLogin();
            document.getElementById('loginEmail').value = document.getElementById('regEmail').value;
        } catch (err) {
            showToast(err.message, 'error');
        } finally {
            btn.innerHTML = 'Create Account →';
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
